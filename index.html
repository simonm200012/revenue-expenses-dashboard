<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revenue & Expenses Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<style>
:root{--bg:#0d0d1a;--bg2:rgba(255,255,255,0.02);--bg3:rgba(255,255,255,0.04);--bg4:rgba(255,255,255,0.06);--text:#e2e8f0;--text2:#cbd5e1;--text3:#94a3b8;--text4:#64748b;--text5:#475569;--border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.1);--tooltip-bg:#1a1a2e;--input-bg:rgba(255,255,255,0.04);--bar-track:rgba(255,255,255,0.04);--table-hover:rgba(255,255,255,0.03);--table-stripe:rgba(255,255,255,0.015);--panel-bg:#12122a;--section-bg:linear-gradient(145deg,rgba(255,255,255,0.02) 0%,rgba(255,255,255,0.04) 100%);--shadow:rgba(0,0,0,0.5)}
[data-theme="light"]{--bg:#f8fafc;--bg2:rgba(0,0,0,0.02);--bg3:rgba(0,0,0,0.03);--bg4:rgba(0,0,0,0.06);--text:#1e293b;--text2:#334155;--text3:#475569;--text4:#64748b;--text5:#94a3b8;--border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.12);--tooltip-bg:#fff;--input-bg:rgba(0,0,0,0.04);--bar-track:rgba(0,0,0,0.06);--table-hover:rgba(0,0,0,0.03);--table-stripe:rgba(0,0,0,0.015);--panel-bg:#f1f5f9;--section-bg:linear-gradient(145deg,rgba(0,0,0,0.01) 0%,rgba(0,0,0,0.03) 100%);--shadow:rgba(0,0,0,0.15)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans','Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
#app{max-width:1200px;margin:0 auto;padding:24px 20px}
.header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:28px;gap:12px;flex-wrap:wrap}
h1{font-size:32px;font-weight:800;letter-spacing:-1.5px;background:linear-gradient(135deg,#10b981 0%,#06b6d4 50%,#8b5cf6 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.subtitle{font-size:13px;color:var(--text5)}
.header-btns{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.icon-btn{background:var(--input-bg);border:1px solid var(--border2);border-radius:8px;color:var(--text);padding:8px 12px;cursor:pointer;font-size:14px;font-family:inherit;transition:all .2s;display:flex;align-items:center;gap:6px}
.icon-btn:hover{border-color:var(--text4)}.icon-btn .lbl{font-size:12px;font-weight:600;color:var(--text4)}
.controls{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.tabs-wrap{position:relative;overflow:hidden;flex:1;min-width:0}
.tabs-wrap::after{content:'';position:absolute;right:0;top:0;bottom:0;width:32px;background:linear-gradient(to right,transparent,var(--bg));pointer-events:none;z-index:1;opacity:0;transition:opacity .3s}
.tabs-wrap.scrollable::after{opacity:1}
.tabs{display:flex;background:var(--bg3);border-radius:10px;padding:3px;border:1px solid var(--border);overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none}
.tabs::-webkit-scrollbar{display:none}
.tab-btn{padding:8px 14px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:600;background:transparent;color:var(--text4);transition:all .2s;font-family:inherit;white-space:nowrap}
.tab-btn.active{background:rgba(16,185,129,0.15);color:#10b981}
.year-select{background:var(--input-bg);border:1px solid var(--border2);border-radius:8px;color:var(--text);padding:8px 14px;font-size:13px;cursor:pointer;font-family:inherit;outline:none}
.year-select option{background:var(--tooltip-bg);color:var(--text)}

.filter-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);z-index:999;opacity:0;pointer-events:none;transition:opacity .3s}
.filter-overlay.open{opacity:1;pointer-events:auto}
.filter-panel{position:fixed;top:0;right:-400px;width:380px;max-width:90vw;height:100%;background:var(--panel-bg);border-left:1px solid var(--border);z-index:1000;transition:right .35s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;box-shadow:-4px 0 24px var(--shadow)}
.filter-panel.open{right:0}
.fp-header{display:flex;justify-content:space-between;align-items:center;padding:20px 24px;border-bottom:1px solid var(--border)}
.fp-title{font-size:16px;font-weight:700;color:var(--text)}
.fp-close{background:none;border:none;color:var(--text4);font-size:22px;cursor:pointer;padding:4px 8px;border-radius:6px;transition:all .2s}
.fp-close:hover{background:var(--bg3);color:var(--text)}
.fp-body{flex:1;overflow-y:auto;padding:20px 24px}
.fp-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:10px}
.fp-group{margin-bottom:20px}
.fp-label{font-size:11px;font-weight:700;color:var(--text4);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:8px}
.fp-select,.fp-input{width:100%;background:var(--input-bg);border:1px solid var(--border2);border-radius:8px;color:var(--text);padding:10px 12px;font-size:13px;font-family:inherit;outline:none}
.fp-select option{background:var(--tooltip-bg);color:var(--text)}
.fp-input:focus,.fp-select:focus{border-color:#10b981}
.fp-row{display:flex;gap:10px}.fp-row>*{flex:1}
.fp-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.fp-chip{padding:5px 12px;border-radius:16px;font-size:11px;font-weight:600;border:1px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer;transition:all .2s}
.fp-chip.active{background:rgba(16,185,129,0.15);color:#10b981;border-color:rgba(16,185,129,0.3)}
.fp-btn{flex:1;padding:10px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
.fp-btn-primary{background:#10b981;color:#fff}.fp-btn-primary:hover{background:#059669}
.fp-btn-secondary{background:var(--bg3);color:var(--text3);border:1px solid var(--border2)}.fp-btn-secondary:hover{background:var(--bg4)}
.active-filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.af-tag{display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:14px;font-size:11px;font-weight:600;background:rgba(16,185,129,0.1);color:#10b981;border:1px solid rgba(16,185,129,0.2)}
.af-tag button{background:none;border:none;color:#10b981;cursor:pointer;font-size:14px;padding:0 2px;font-weight:700}

.kpis{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap}
.kpi{background:var(--section-bg);border:1px solid var(--border);border-radius:12px;padding:20px 24px;flex:1;min-width:150px}
.kpi-label{font-size:11px;color:var(--text4);text-transform:uppercase;letter-spacing:1.2px;font-weight:700;margin-bottom:6px}
.kpi-value{font-size:26px;font-weight:800;letter-spacing:-1px;font-family:'JetBrains Mono',monospace}
.kpi-sub{font-size:11px;color:var(--text4);margin-top:4px}
.grid{display:grid;gap:16px}.grid-2{grid-template-columns:1fr 1fr}.grid-1{grid-template-columns:1fr}.span-2{grid-column:span 2}
.section{background:var(--section-bg);border:1px solid var(--border);border-radius:14px;padding:24px}
.section-title{font-size:13px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:20px;border-bottom:1px solid var(--border);padding-bottom:10px}
.bar-item{margin-bottom:10px}.bar-header{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px}
.bar-label{color:var(--text2)}.bar-value{color:var(--text3);font-family:'JetBrains Mono',monospace;font-size:11px}
.bar-track{height:6px;background:var(--bar-track);border-radius:3px}.bar-fill{height:100%;border-radius:3px;transition:width .6s ease}
.bar-list{max-height:380px;overflow:auto}

.insights{margin-top:24px;padding:20px 24px;background:linear-gradient(135deg,rgba(16,185,129,0.05) 0%,rgba(139,92,246,0.05) 100%);border:1px solid var(--border);border-radius:14px}
.insights-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;font-size:13px;color:var(--text3);line-height:1.6}

.search-bar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.search-input{flex:1;min-width:200px;background:var(--input-bg);border:1px solid var(--border2);border-radius:8px;color:var(--text);padding:10px 14px;font-size:13px;font-family:inherit;outline:none}
.search-input:focus{border-color:#10b981}
.txn-table{width:100%;border-collapse:collapse;font-size:12px}
.txn-table th{text-align:left;padding:10px 12px;color:var(--text4);font-weight:700;text-transform:uppercase;letter-spacing:1px;font-size:10px;border-bottom:2px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:1}
.txn-table td{padding:8px 12px;border-bottom:1px solid var(--border);color:var(--text2)}
.txn-table tr:nth-child(even){background:var(--table-stripe)}.txn-table tr:hover td{background:var(--table-hover)}
.txn-table .in{color:#10b981;font-weight:600}.txn-table .out{color:#ef4444;font-weight:600}
.table-wrap{max-height:500px;overflow:auto;border:1px solid var(--border);border-radius:10px}
.table-footer{display:flex;justify-content:space-between;align-items:center;margin-top:12px;font-size:12px;color:var(--text4);flex-wrap:wrap;gap:8px}
.page-btn{background:var(--input-bg);border:1px solid var(--border2);border-radius:6px;color:var(--text);padding:6px 14px;cursor:pointer;font-size:12px;font-family:inherit}
.page-btn:hover{border-color:var(--text4)}.page-btn:disabled{opacity:.3;cursor:not-allowed}

.compare-row{display:flex;gap:16px;margin-bottom:16px;align-items:center;flex-wrap:wrap}
.compare-select{background:var(--input-bg);border:1px solid var(--border2);border-radius:8px;color:var(--text);padding:10px 14px;font-size:13px;font-family:inherit;outline:none}
.compare-select option{background:var(--tooltip-bg);color:var(--text)}
.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.compare-card{background:var(--section-bg);border:1px solid var(--border);border-radius:12px;padding:20px}
.compare-card h4{font-size:15px;font-weight:700;color:var(--text);margin-bottom:14px}
.compare-stat{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}.compare-stat:last-child{border-bottom:none}
.delta{font-size:12px;padding:2px 8px;border-radius:4px;font-weight:600;font-family:'JetBrains Mono',monospace}
.delta.pos{background:rgba(16,185,129,0.15);color:#10b981}.delta.neg{background:rgba(239,68,68,0.15);color:#ef4444}

.proj-controls{display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap;align-items:center}

/* === AI CHAT WIDGET === */
.chat-fab{position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:50%;border:none;cursor:pointer;background:linear-gradient(135deg,#10b981 0%,#8b5cf6 100%);color:#fff;font-size:24px;box-shadow:0 6px 20px rgba(0,0,0,0.35);z-index:998;transition:transform .2s;display:flex;align-items:center;justify-content:center}
.chat-fab:hover{transform:scale(1.06)}
.chat-panel{position:fixed;bottom:90px;right:24px;width:400px;max-width:calc(100vw - 32px);height:600px;max-height:calc(100vh - 120px);background:var(--panel-bg);border:1px solid var(--border);border-radius:16px;z-index:999;display:none;flex-direction:column;box-shadow:0 12px 36px var(--shadow);overflow:hidden}
.chat-panel.open{display:flex}
.chat-header{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid var(--border);background:var(--bg3)}
.chat-title{font-size:14px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px}
.chat-title .dot{width:8px;height:8px;border-radius:50%;background:#10b981;box-shadow:0 0 8px #10b981}
.chat-head-btns{display:flex;gap:4px}
.chat-head-btns button{background:none;border:none;color:var(--text4);cursor:pointer;padding:4px 8px;border-radius:6px;font-size:16px}
.chat-head-btns button:hover{background:var(--bg4);color:var(--text)}
.chat-msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.chat-msg{max-width:85%;padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.5;white-space:pre-wrap;word-wrap:break-word}
.chat-msg.user{align-self:flex-end;background:#10b981;color:#fff;border-bottom-right-radius:4px}
.chat-msg.bot{align-self:flex-start;background:var(--bg3);color:var(--text2);border:1px solid var(--border);border-bottom-left-radius:4px}
.chat-msg.bot.error{border-color:rgba(239,68,68,0.4);color:#ef4444}
.chat-empty{text-align:center;color:var(--text5);font-size:12px;padding:30px 16px}
.chat-empty .suggestions{display:flex;flex-direction:column;gap:6px;margin-top:14px}
.chat-empty .sg{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:8px 12px;color:var(--text3);cursor:pointer;font-size:12px;text-align:left;font-family:inherit;transition:all .15s}
.chat-empty .sg:hover{border-color:#10b981;color:#10b981}
.chat-input-row{display:flex;gap:8px;padding:12px;border-top:1px solid var(--border);background:var(--bg2)}
.chat-input{flex:1;background:var(--input-bg);border:1px solid var(--border2);border-radius:10px;color:var(--text);padding:10px 12px;font-size:13px;font-family:inherit;outline:none;resize:none;max-height:120px;min-height:40px}
.chat-input:focus{border-color:#10b981}
.chat-send{background:#10b981;color:#fff;border:none;border-radius:10px;padding:0 16px;cursor:pointer;font-weight:600;font-size:13px;font-family:inherit}
.chat-send:disabled{opacity:.4;cursor:not-allowed}
.chat-settings{position:absolute;inset:0;background:var(--panel-bg);padding:18px;display:none;flex-direction:column;gap:14px;overflow-y:auto}
.chat-settings.open{display:flex}
.chat-settings h3{font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px}
.chat-settings label{font-size:11px;font-weight:700;color:var(--text4);text-transform:uppercase;letter-spacing:1.2px;display:block;margin-bottom:6px}
.chat-settings input,.chat-settings select{width:100%;background:var(--input-bg);border:1px solid var(--border2);border-radius:8px;color:var(--text);padding:10px 12px;font-size:13px;font-family:inherit;outline:none}
.chat-settings input:focus,.chat-settings select:focus{border-color:#10b981}
.chat-settings .hint{font-size:11px;color:var(--text5);line-height:1.5;margin-top:-6px}
.chat-settings .hint a{color:#10b981;text-decoration:none}
.chat-settings .btns{display:flex;gap:8px;margin-top:auto}
.chat-settings .btns button{flex:1;padding:10px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.chat-typing{display:inline-flex;gap:3px;align-items:center}
.chat-typing span{width:6px;height:6px;border-radius:50%;background:var(--text4);animation:chatBlink 1.2s infinite}
.chat-typing span:nth-child(2){animation-delay:.2s}.chat-typing span:nth-child(3){animation-delay:.4s}
@keyframes chatBlink{0%,80%,100%{opacity:.2}40%{opacity:1}}
@media(max-width:480px){.chat-panel{right:8px;left:8px;width:auto;bottom:84px;height:calc(100vh - 100px)}.chat-fab{bottom:16px;right:16px}}
.proj-label{font-size:12px;color:var(--text4);font-weight:600}
.proj-input{background:var(--input-bg);border:1px solid var(--border2);border-radius:8px;color:var(--text);padding:8px 12px;font-size:13px;font-family:inherit;outline:none;width:100px}
.proj-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:20px}
.proj-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center}
.proj-card-label{font-size:11px;color:var(--text4);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.proj-card-value{font-size:22px;font-weight:800;font-family:'JetBrains Mono',monospace}

/* Grower badges */
.grower{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.grower:last-child{border-bottom:none}
.grower-name{flex:1;color:var(--text2)}
.grower-vals{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3)}
.grower-delta{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;padding:2px 8px;border-radius:4px}
.grower-delta.up{background:rgba(239,68,68,0.12);color:#ef4444}
.grower-delta.down{background:rgba(16,185,129,0.12);color:#10b981}

/* Recurring */
.rec-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-bottom:20px}
.rec-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:16px;display:flex;flex-direction:column;gap:6px}
.rec-card-head{display:flex;justify-content:space-between;align-items:center}
.rec-card-name{font-size:13px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:65%}
.rec-card-freq{font-size:10px;font-weight:700;color:var(--text4);text-transform:uppercase;letter-spacing:.8px;padding:2px 8px;background:var(--bg4);border-radius:10px}
.rec-card-amt{font-size:20px;font-weight:800;font-family:'JetBrains Mono',monospace;color:#ef4444}
.rec-card-annual{font-size:11px;color:var(--text4)}
.rec-card.income .rec-card-amt{color:#10b981}
.rec-summary{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.rec-summary-card{background:var(--section-bg);border:1px solid var(--border);border-radius:12px;padding:16px 20px;flex:1;min-width:180px}
.rec-summary-label{font-size:10px;color:var(--text4);text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:4px}
.rec-summary-value{font-size:22px;font-weight:800;font-family:'JetBrains Mono',monospace}

/* Sparklines */
.spark-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.spark-row:last-child{border-bottom:none}
.spark-label{flex:1;font-size:12px;color:var(--text2);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.spark-canvas{flex-shrink:0}
.spark-value{font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--text3);min-width:60px;text-align:right}
.spark-delta{font-size:10px;font-weight:700;font-family:'JetBrains Mono',monospace;padding:1px 6px;border-radius:4px;min-width:48px;text-align:center}
.spark-delta.up{background:rgba(239,68,68,0.12);color:#ef4444}
.spark-delta.down{background:rgba(16,185,129,0.12);color:#10b981}
.spark-delta.flat{background:var(--bg4);color:var(--text4)}

/* Treemap */
.treemap{display:flex;flex-wrap:wrap;gap:3px;border-radius:10px;overflow:hidden;min-height:280px}
.treemap-item{border-radius:6px;padding:10px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;cursor:default;transition:opacity .2s;position:relative;overflow:hidden;min-height:60px}
.treemap-item:hover{opacity:.85}
.treemap-item-label{font-size:11px;font-weight:700;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.5);line-height:1.2;word-break:break-word}
.treemap-item-value{font-size:10px;color:rgba(255,255,255,.85);font-family:'JetBrains Mono',monospace;text-shadow:0 1px 3px rgba(0,0,0,.5)}
.treemap-item-pct{font-size:9px;color:rgba(255,255,255,.7);font-family:'JetBrains Mono',monospace}

/* Forecast */
.forecast-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:12px}
.forecast-table th{text-align:left;padding:8px 10px;color:var(--text4);font-weight:700;text-transform:uppercase;letter-spacing:.8px;font-size:10px;border-bottom:2px solid var(--border)}
.forecast-table td{padding:6px 10px;border-bottom:1px solid var(--border);color:var(--text2)}
.forecast-table tr:nth-child(even){background:var(--table-stripe)}


#merchantPanel{right:0;width:520px;display:none}
#merchantPanel.open{display:flex}

/* Heatmap */
.heatmap-wrap{overflow-x:auto;padding:8px 0}
.heatmap{display:inline-grid;grid-auto-flow:column;grid-template-rows:repeat(7,12px);gap:3px}
.heatmap-cell{width:12px;height:12px;border-radius:2px;background:var(--bg4);cursor:pointer;transition:transform .1s}
.heatmap-cell:hover{transform:scale(1.4);outline:1px solid var(--text4)}
.heatmap-legend{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text4);margin-top:8px;justify-content:flex-end}

// ============================================================
// HELPERS (escape, etc.)

function escapeHtml(s){return String(s||'').replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function escapeAttr(s){return escapeHtml(s).replace(/\\/g,'\\\\');}

// ============================================================
// AUTO-CATEGORIZATION RULES (localStorage-backed)
// ============================================================
const RULES_KEY='fin-cat-rules';
let RULES=[];
function loadRules(){try{RULES=JSON.parse(localStorage.getItem(RULES_KEY))||[]}catch{RULES=[]}}
function saveRules(){localStorage.setItem(RULES_KEY,JSON.stringify(RULES))}
function compileRule(r){
  if(!r.enabled)return null;
  if(r.isRegex){try{return new RegExp(r.pattern,'i')}catch{return null}}
  const lit=r.pattern.toLowerCase();
  return {test:s=>(s||'').toLowerCase().includes(lit)};
}
function applyCategoryRules(txns){
  const compiled=RULES.map(r=>({rule:r,matcher:compileRule(r)})).filter(x=>x.matcher);
  for(const t of txns){
    for(const {rule,matcher} of compiled){
      const field=rule.target==='source'?t.s:rule.target==='detail'?t.r:t.c;
      if(matcher.test(field)){t.c=rule.category;break}
    }
  }
}
loadRules();

async function loadFromSupabase() {
  document.getElementById('content').innerHTML = '<div style="text-align:center;padding:60px;color:var(--text4)"><p style="font-size:18px">Loading transactions from Supabase...</p></div>';

  // Fetch all rows (Supabase paginates at 1000 by default)
  let allData = [];
  let from = 0;
  const batchSize = 1000;
  while (true) {
    const { data, error } = await _supabase
      .from('transactions')
      .select('*')
      .order('date', { ascending: false })
      .range(from, from + batchSize - 1);
    if (error) { console.error('Supabase error:', error); break; }
    if (!data || data.length === 0) break;
    allData = allData.concat(data);
    if (data.length < batchSize) break;
    from += batchSize;
  }

  // Transform Supabase rows → dashboard format {d, v, s, b, t, c, r}
  TXNS = allData.map(row => ({
    d: row.date || '',
    v: parseFloat(row.value) || 0,
    s: row.source || '',
    b: row.bank || '',
    t: row.type === 'Inflow' ? 'In' : 'Out',
    c: row.final_category || row.category || '',
    r: row.cost_revenue_type || ''
  })).filter(t => t.d); // skip rows without dates

  // Sort by date descending (newest first, matching original)
  TXNS.sort((a, b) => b.d.localeCompare(a.d));

  // Capture immutable snapshot, then apply rules
  ORIGINAL_TXNS = TXNS.map(t => ({ ...t }));
  applyCategoryRules(TXNS);

  recomputeAggregates();

  // Update subtitle with dynamic count and date range
  const dates = TXNS.map(t => t.d).filter(Boolean);
  const minDate = dates[dates.length - 1] || '';
  const maxDate = dates[0] || '';
  const minMonth = minDate ? new Date(minDate).toLocaleString('en', { month: 'short', year: 'numeric' }) : '';
  const maxMonth = maxDate ? new Date(maxDate).toLocaleString('en', { month: 'short', year: 'numeric' }) : '';
  document.querySelector('.subtitle').textContent = minMonth + ' \u2014 ' + maxMonth + ' \u00B7 ' + TXNS.length.toLocaleString() + ' transactions (live)';

  // Dynamically populate year filter
  const years = [...new Set(TXNS.map(t => t.d.slice(0, 4)))].sort();
  const yearSel = document.getElementById('yearFilter');
  yearSel.innerHTML = '<option value="All">All Years</option>' + years.map(y => '<option value="' + y + '">' + y + '</option>').join('');

  // Populate category filter
  const allCats = [...new Set(TXNS.map(t => t.c))].filter(Boolean).sort();
  document.getElementById('fpCategory').innerHTML = '<option value="">All Categories</option>' + allCats.map(c => '<option value="' + c.replace(/"/g, '&quot;') + '">' + c + '</option>').join('');
}

function recomputeAggregates() {
  // MONTHLY
  const monthMap = {};
  TXNS.forEach(t => {
    const ym = t.d.slice(0, 7);
    if (!monthMap[ym]) monthMap[ym] = { YM: ym, Inflow: 0, Outflow: 0 };
    if (t.t === 'In') monthMap[ym].Inflow += t.v;
    else monthMap[ym].Outflow += t.v;
  });
  MONTHLY = Object.values(monthMap).sort((a, b) => a.YM.localeCompare(b.YM));
  MONTHLY.forEach(d => { d.Inflow = Math.round(d.Inflow * 100) / 100; d.Outflow = Math.round(d.Outflow * 100) / 100; d.Net = d.Inflow - d.Outflow; });

  // YEARLY
  const yearMap = {};
  TXNS.forEach(t => {
    const yr = parseInt(t.d.slice(0, 4));
    if (!yearMap[yr]) yearMap[yr] = { Year: yr, Inflow: 0, Outflow: 0 };
    if (t.t === 'In') yearMap[yr].Inflow += t.v;
    else yearMap[yr].Outflow += t.v;
  });
  YEARLY = Object.values(yearMap).sort((a, b) => a.Year - b.Year);
  YEARLY.forEach(d => { d.Inflow = Math.round(d.Inflow * 100) / 100; d.Outflow = Math.round(d.Outflow * 100) / 100; d.Net = d.Inflow - d.Outflow; });

  // TOP_CATEGORIES (outflow only, top 15)
  const catMap = {};
  TXNS.filter(t => t.t === 'Out').forEach(t => { catMap[t.c] = (catMap[t.c] || 0) + t.v; });
  TOP_CATEGORIES = Object.entries(catMap).map(([c, v]) => ({ Category: c, Total: Math.round(v) })).sort((a, b) => b.Total - a.Total).slice(0, 15);

  // TOP_SOURCES (outflow only, top 15)
  const srcMap = {};
  TXNS.filter(t => t.t === 'Out').forEach(t => { srcMap[t.s] = (srcMap[t.s] || 0) + t.v; });
  TOP_SOURCES = Object.entries(srcMap).map(([s, v]) => ({ Source: s, Total: Math.round(v) })).sort((a, b) => b.Total - a.Total).slice(0, 15);

  // INCOME_TYPES
  const incMap = {};
  TXNS.filter(t => t.t === 'In').forEach(t => { const key = t.r || t.c || 'Other'; incMap[key] = (incMap[key] || 0) + t.v; });
  INCOME_TYPES = Object.entries(incMap).map(([t, v]) => ({ Type: t, Total: Math.round(v) })).sort((a, b) => b.Total - a.Total).slice(0, 10);

  // DOW_SORTED
  const dowMap = { 0: { Day: 'Sun', Total: 0, Count: 0 }, 1: { Day: 'Mon', Total: 0, Count: 0 }, 2: { Day: 'Tue', Total: 0, Count: 0 }, 3: { Day: 'Wed', Total: 0, Count: 0 }, 4: { Day: 'Thu', Total: 0, Count: 0 }, 5: { Day: 'Fri', Total: 0, Count: 0 }, 6: { Day: 'Sat', Total: 0, Count: 0 } };
  TXNS.forEach(t => { const dow = new Date(t.d).getDay(); dowMap[dow].Total += t.v; dowMap[dow].Count++; });
  DOW_SORTED = [1, 2, 3, 4, 5, 6, 0].map(i => ({ Day: dowMap[i].Day, Total: Math.round(dowMap[i].Total), Count: dowMap[i].Count }));
}

const P=["#10b981","#3b82f6","#f59e0b","#8b5cf6","#ec4899","#06b6d4","#f97316","#84cc16","#14b8a6","#6366f1","#f43f5e","#0ea5e9","#d946ef","#7c3aed","#ef4444"];
const fmt=v=>v>=1000?(v/1000).toFixed(1)+"k":Math.round(v).toLocaleString();
const fmtE=v=>"\u20AC"+Math.round(v).toLocaleString();

let activeTab="overview",yearFilter="All",charts={},txnPage=0;
const TABS=["overview","spending","income","trends","recurring","transactions","compare","projection","rules"];
const TAB_LABELS={overview:"Overview",spending:"Spending",income:"Income",trends:"Trends",recurring:"Recurring",transactions:"Transactions",compare:"Compare",projection:"Projection",rules:"Rules"};
let gFilters={type:"",bank:"",category:"",dateFrom:"",dateTo:"",amtMin:"",amtMax:"",search:""};

let dashboardSubtitle='Loading from Supabase...';


// ============================================================
// URL HASH STATE
// ============================================================
const HASH_KEYS={tab:'activeTab',year:'yearFilter',type:'type',bank:'bank',category:'category',from:'dateFrom',to:'dateTo',min:'amtMin',max:'amtMax',q:'search',page:'txnPage'};
function serializeStateToHash(){
  const params=new URLSearchParams();
  if(activeTab!=='overview')params.set('tab',activeTab);
  if(yearFilter!=='All')params.set('year',yearFilter);
  for(const [hk,gk] of Object.entries(HASH_KEYS)){
    if(['tab','year','page'].includes(hk))continue;
    if(gFilters[gk])params.set(hk,gFilters[gk]);
  }
  if(txnPage>0)params.set('page',String(txnPage));
  const h=params.toString();
  history.replaceState(null,'',h?'#'+h:location.pathname+location.search);
}
function restoreStateFromHash(){
  if(!location.hash)return;
  const params=new URLSearchParams(location.hash.slice(1));
  if(params.has('tab')&&TABS.includes(params.get('tab')))activeTab=params.get('tab');
  if(params.has('year'))yearFilter=params.get('year');
  for(const [hk,gk] of Object.entries(HASH_KEYS)){
    if(['tab','year','page'].includes(hk))continue;
    if(params.has(hk))gFilters[gk]=params.get(hk);
  }
  if(params.has('page'))txnPage=parseInt(params.get('page'))||0;
  document.querySelectorAll('.tab-btn').forEach(b=>{b.classList.toggle('active',b.dataset.tab===activeTab)});
  const yEl=document.getElementById('yearFilter');if(yEl)yEl.value=yearFilter;
}
window.addEventListener('popstate',()=>{restoreStateFromHash();render();});

// Tab scroll hint
function checkTabScroll(){const w=document.getElementById("tabsWrap");const t=w.querySelector(".tabs");w.classList.toggle("scrollable",t.scrollWidth>w.clientWidth)}

// Build tabs
document.getElementById("tabsBar").innerHTML=TABS.map(t=>`<button class="tab-btn${t===activeTab?' active':''}" data-tab="${t}">${TAB_LABELS[t]}</button>`).join("");
document.querySelectorAll(".tab-btn").forEach(b=>b.addEventListener("click",()=>{document.querySelectorAll(".tab-btn").forEach(x=>x.classList.remove("active"));b.classList.add("active");activeTab=b.dataset.tab;txnPage=0;render();serializeStateToHash();}));
window.addEventListener("resize",checkTabScroll);setTimeout(checkTabScroll,100);

// Filter panel
function openFilters(){document.getElementById("filterPanel").classList.add("open");document.getElementById("filterOverlay").classList.add("open");document.getElementById("fpDateFrom").value=gFilters.dateFrom;document.getElementById("fpDateTo").value=gFilters.dateTo;document.getElementById("fpCategory").value=gFilters.category;document.getElementById("fpAmtMin").value=gFilters.amtMin;document.getElementById("fpAmtMax").value=gFilters.amtMax;document.getElementById("fpSearch").value=gFilters.search;setChipState("fpTypeChips",gFilters.type);setChipState("fpBankChips",gFilters.bank)}
function closeFilters(){document.getElementById("filterPanel").classList.remove("open");document.getElementById("filterOverlay").classList.remove("open")}
function toggleChip(el){el.parentElement.querySelectorAll(".fp-chip").forEach(c=>c.classList.remove("active"));el.classList.add("active")}
function setChipState(id,val){const c=document.getElementById(id);if(!c)return;c.querySelectorAll(".fp-chip").forEach(x=>{x.classList.remove("active");if(x.dataset.val===val)x.classList.add("active")})}
function getChipVal(id){const c=document.getElementById(id);if(!c)return"";const a=c.querySelector(".fp-chip.active");return a?a.dataset.val:""}
function applyFilters(){gFilters={type:getChipVal("fpTypeChips"),bank:getChipVal("fpBankChips"),category:document.getElementById("fpCategory").value,dateFrom:document.getElementById("fpDateFrom").value,dateTo:document.getElementById("fpDateTo").value,amtMin:document.getElementById("fpAmtMin").value,amtMax:document.getElementById("fpAmtMax").value,search:document.getElementById("fpSearch").value};closeFilters();txnPage=0;render();serializeStateToHash();}
function resetFilters(){gFilters={type:"",bank:"",category:"",dateFrom:"",dateTo:"",amtMin:"",amtMax:"",search:""};document.getElementById("fpDateFrom").value="";document.getElementById("fpDateTo").value="";document.getElementById("fpCategory").value="";document.getElementById("fpAmtMin").value="";document.getElementById("fpAmtMax").value="";document.getElementById("fpSearch").value="";setChipState("fpTypeChips","");setChipState("fpBankChips","");closeFilters();txnPage=0;render();serializeStateToHash();}
function removeFilter(k){gFilters[k]="";txnPage=0;render();serializeStateToHash();}
function renderActiveTags(){const el=document.getElementById("activeFilters");const t=[];if(yearFilter!=="All")t.push({key:"_year",label:"Year: "+yearFilter});if(gFilters.type)t.push({key:"type",label:"Type: "+(gFilters.type==="In"?"Inflow":"Outflow")});if(gFilters.bank)t.push({key:"bank",label:"Bank: "+gFilters.bank});if(gFilters.category)t.push({key:"category",label:gFilters.category});if(gFilters.dateFrom)t.push({key:"dateFrom",label:"From: "+gFilters.dateFrom});if(gFilters.dateTo)t.push({key:"dateTo",label:"To: "+gFilters.dateTo});if(gFilters.amtMin)t.push({key:"amtMin",label:"Min \u20AC"+gFilters.amtMin});if(gFilters.amtMax)t.push({key:"amtMax",label:"Max \u20AC"+gFilters.amtMax});if(gFilters.search)t.push({key:"search",label:'"'+gFilters.search+'"'});el.innerHTML=t.map(x=>`<span class="af-tag">${x.label}<button onclick="${x.key==='_year'?'document.getElementById(\"yearFilter\").value=\"All\";yearFilter=\"All\";render()':'removeFilter(\''+x.key+'\')'}">\u00D7</button></span>`).join("")}

function getFilteredTxns(){let f=TXNS;if(yearFilter!=="All")f=f.filter(t=>t.d.startsWith(yearFilter));if(gFilters.type)f=f.filter(t=>t.t===gFilters.type);if(gFilters.bank)f=f.filter(t=>t.b===gFilters.bank);if(gFilters.category)f=f.filter(t=>t.c===gFilters.category);if(gFilters.dateFrom)f=f.filter(t=>t.d>=gFilters.dateFrom);if(gFilters.dateTo)f=f.filter(t=>t.d<=gFilters.dateTo);if(gFilters.amtMin)f=f.filter(t=>t.v>=parseFloat(gFilters.amtMin));if(gFilters.amtMax)f=f.filter(t=>t.v<=parseFloat(gFilters.amtMax));if(gFilters.search){const q=gFilters.search.toLowerCase();f=f.filter(t=>(t.s+t.c+t.r+t.b+t.d).toLowerCase().includes(q))}return f}
function hasActiveFilters(){return yearFilter!=="All"||Object.values(gFilters).some(v=>v!=="")}
function getFilteredMonthly(){const txns=getFilteredTxns();const map={};txns.forEach(t=>{const ym=t.d.slice(0,7);if(!map[ym])map[ym]={YM:ym,Inflow:0,Outflow:0};if(t.t==="In")map[ym].Inflow+=t.v;else map[ym].Outflow+=t.v});const arr=Object.values(map).sort((a,b)=>a.YM.localeCompare(b.YM));arr.forEach(d=>d.Net=d.Inflow-d.Outflow);return arr}
function gfm(){if(hasActiveFilters()){return getFilteredMonthly()}return MONTHLY}
function getTotals(){const m=gfm();const i=m.reduce((s,d)=>s+d.Inflow,0),o=m.reduce((s,d)=>s+d.Outflow,0);return{inflow:i,outflow:o,net:i-o,rate:i>0?((i-o)/i*100):0}}

// CSV Export
function exportCSV(){const txns=getFilteredTxns();let csv="\uFEFFDate,Source,Amount,Type,Bank,Category,Detail\n";txns.forEach(t=>{const src=(t.s||"").replace(/"/g,'""');const cat=(t.c||"").replace(/"/g,'""');const det=(t.r||"").replace(/"/g,'""');const bank=(t.b||"").replace(/"/g,'""');csv+=`${t.d},"${src}",${t.v},${t.t==="In"?"Inflow":"Outflow"},"${bank}","${cat}","${det}"\n`});const blob=new Blob([csv],{type:"text/csv;charset=utf-8"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);const suffix=yearFilter!=="All"?"_"+yearFilter:"";a.download="transactions"+(hasActiveFilters()?"_filtered"+suffix:"")+".csv";a.click()}

function updateChartColors(){Chart.defaults.color="#64748b";Chart.defaults.borderColor=theme==="dark"?"rgba(255,255,255,0.04)":"rgba(0,0,0,0.06)";Chart.defaults.plugins.tooltip.backgroundColor=theme==="dark"?"#1a1a2e":"#fff";Chart.defaults.plugins.tooltip.titleColor=theme==="dark"?"#e2e8f0":"#1e293b";Chart.defaults.plugins.tooltip.bodyColor=theme==="dark"?"#cbd5e1":"#334155";Chart.defaults.plugins.tooltip.borderColor=theme==="dark"?"rgba(255,255,255,0.1)":"rgba(0,0,0,0.1)";Chart.defaults.plugins.tooltip.borderWidth=1;Chart.defaults.plugins.tooltip.cornerRadius=8;Chart.defaults.plugins.tooltip.padding=10}

function mc(id,h){return`<div style="position:relative;height:${h}px"><canvas id="${id}"></canvas></div>`}
function bl(items,lk,vk,mx,onClick){return'<div class="bar-list">'+items.map((it,i)=>{const raw=String(it[lk]||'');const ch=onClick?` style="cursor:pointer" data-merchant="${escapeHtml(raw)}" onclick="${onClick}(this.dataset.merchant)"`:'';return `<div class="bar-item"${ch}><div class="bar-header"><span class="bar-label">${escapeHtml(raw)}</span><span class="bar-value">${fmtE(it[vk])}</span></div><div class="bar-track"><div class="bar-fill" style="width:${(it[vk]/mx)*100}%;background:${P[i%P.length]}"></div></div></div>`}).join("")+"</div>"}
function ttcb(ds){return{callbacks:{label:ctx=>ds?ctx.dataset.label+": "+fmtE(ctx.parsed.y):fmtE(ctx.parsed.y)}}}

// Dynamic insights
function renderInsights(){
  const txns=getFilteredTxns();const outT=txns.filter(t=>t.t==="Out");const inT=txns.filter(t=>t.t==="In");
  const totalIn=inT.reduce((s,t)=>s+t.v,0),totalOut=outT.reduce((s,t)=>s+t.v,0);
  // Top category
  const catMap={};outT.forEach(t=>{catMap[t.c]=(catMap[t.c]||0)+t.v});
  const topCat=Object.entries(catMap).sort((a,b)=>b[1]-a[1])[0];
  // Top source
  const srcMap={};outT.forEach(t=>{srcMap[t.s]=(srcMap[t.s]||0)+t.v});
  const topSrc=Object.entries(srcMap).sort((a,b)=>b[1]-a[1])[0];
  // Top income
  const incMap={};inT.forEach(t=>{incMap[t.r]=(incMap[t.r]||0)+t.v});
  const topInc=Object.entries(incMap).sort((a,b)=>b[1]-a[1])[0];
  // YoY growers — categories that grew most vs prior period
  let growerHTML="";
  const curYear=yearFilter!=="All"?parseInt(yearFilter):2025;
  const prevYear=curYear-1;
  const curOut=TXNS.filter(t=>t.t==="Out"&&t.d.startsWith(curYear.toString()));
  const prevOut=TXNS.filter(t=>t.t==="Out"&&t.d.startsWith(prevYear.toString()));
  if(curOut.length&&prevOut.length){
    const curCats={},prevCats={};
    curOut.forEach(t=>{curCats[t.c]=(curCats[t.c]||0)+t.v});
    prevOut.forEach(t=>{prevCats[t.c]=(prevCats[t.c]||0)+t.v});
    const growers=Object.keys(curCats).filter(c=>prevCats[c]&&prevCats[c]>50).map(c=>({cat:c,cur:curCats[c],prev:prevCats[c],delta:curCats[c]-prevCats[c],pct:((curCats[c]-prevCats[c])/prevCats[c]*100)})).sort((a,b)=>b.delta-a.delta).slice(0,3);
    const shrinkers=Object.keys(prevCats).filter(c=>curCats[c]&&prevCats[c]>50).map(c=>({cat:c,cur:curCats[c]||0,prev:prevCats[c],delta:(curCats[c]||0)-prevCats[c],pct:(((curCats[c]||0)-prevCats[c])/prevCats[c]*100)})).sort((a,b)=>a.delta-b.delta).slice(0,2);
    if(growers.length){
      growerHTML=`<div style="margin-top:16px"><div style="font-size:12px;font-weight:700;color:var(--text4);margin-bottom:8px">\u2191 BIGGEST INCREASES ${curYear} vs ${prevYear}</div>`;
      growers.forEach(g=>{growerHTML+=`<div class="grower"><span class="grower-name">${g.cat}</span><span class="grower-vals">${fmtE(g.prev)} \u2192 ${fmtE(g.cur)}</span><span class="grower-delta up">+${g.pct.toFixed(0)}%</span></div>`});
      growerHTML+=`</div>`;
    }
    if(shrinkers.length){
      growerHTML+=`<div style="margin-top:12px"><div style="font-size:12px;font-weight:700;color:var(--text4);margin-bottom:8px">\u2193 BIGGEST DECREASES ${curYear} vs ${prevYear}</div>`;
      shrinkers.forEach(g=>{growerHTML+=`<div class="grower"><span class="grower-name">${g.cat}</span><span class="grower-vals">${fmtE(g.prev)} \u2192 ${fmtE(g.cur)}</span><span class="grower-delta down">${g.pct.toFixed(0)}%</span></div>`});
      growerHTML+=`</div>`;
    }
  }

  document.getElementById("insightsSection").innerHTML=`
    <div class="section-title">Key Insights${yearFilter!=="All"?' \u2014 '+yearFilter:''}</div>
    <div class="insights-grid">
      <div><span style="color:#10b981">\u2197</span> Total income: <span style="color:var(--text)">${fmtE(totalIn)}</span> across <strong>${inT.length}</strong> transactions.${topInc?` Top source: <span style="color:#10b981">${topInc[0]}</span> (${fmtE(topInc[1])}).`:''}</div>
      <div><span style="color:#ef4444">\u2199</span> Total spent: <span style="color:var(--text)">${fmtE(totalOut)}</span> across <strong>${outT.length}</strong> transactions.${topCat?` #1 category: <span style="color:#ef4444">${topCat[0]}</span> (${fmtE(topCat[1])}).`:''}</div>
      <div><span style="color:#06b6d4">📊</span> ${topSrc?`Top merchant: <span style="color:var(--text)">${topSrc[0]}</span> at ${fmtE(topSrc[1])}.`:'No outflow data.'} Net: <span style="color:${totalIn-totalOut>=0?'#10b981':'#ef4444'}">${fmtE(totalIn-totalOut)}</span>.</div>
      <div><span style="color:#8b5cf6">💡</span> ${outT.length?`Avg transaction: ${fmtE(totalOut/outT.length)}. Largest: ${fmtE(Math.max(...outT.map(t=>t.v)))}.`:'No spending data for this selection.'}</div>
    </div>
    ${growerHTML}`;
}

function getDynamicCats(){if(!hasActiveFilters())return TOP_CATEGORIES;const txns=getFilteredTxns().filter(t=>t.t==="Out");const m={};txns.forEach(t=>{m[t.c]=(m[t.c]||0)+t.v});return Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,15).map(([k,v])=>({Category:k,Total:Math.round(v)}))}
function getDynamicSources(){if(!hasActiveFilters())return TOP_SOURCES;const txns=getFilteredTxns().filter(t=>t.t==="Out");const m={};txns.forEach(t=>{m[t.s]=(m[t.s]||0)+t.v});return Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,15).map(([k,v])=>({Source:k,Total:Math.round(v)}))}
function getDynamicIncome(){if(!hasActiveFilters())return INCOME_TYPES;const txns=getFilteredTxns().filter(t=>t.t==="In");const m={};txns.forEach(t=>{m[t.r]=(m[t.r]||0)+t.v});return Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,10).map(([k,v])=>({Type:k,Total:Math.round(v)}))}

function filterTxns(){let filtered=getFilteredTxns();const q=(document.getElementById("txnSearch").value||"").toLowerCase();if(q)filtered=filtered.filter(t=>(t.s+t.c+t.r+t.b+t.d).toLowerCase().includes(q));const pp=50,total=filtered.length,pages=Math.ceil(total/pp);if(txnPage>=pages)txnPage=Math.max(0,pages-1);const sl=filtered.slice(txnPage*pp,(txnPage+1)*pp);document.getElementById("txnBody").innerHTML=sl.map(t=>`<tr><td>${t.d}</td><td style="cursor:pointer;color:var(--text)" data-merchant="${escapeHtml(t.s||'')}" onclick="openMerchant(this.dataset.merchant)">${escapeHtml(t.s)}</td><td class="${t.t==='In'?'in':'out'}">${t.t==='In'?'+':'\u2212'}\u20AC${t.v.toFixed(2)}</td><td>${t.t==='In'?'Inflow':'Outflow'}</td><td>${escapeHtml(t.c)}</td><td>${escapeHtml(t.r)}</td></tr>`).join("");document.getElementById("txnCount").textContent=`${total} transactions \u00B7 Page ${txnPage+1}/${Math.max(pages,1)}`;document.getElementById("prevBtn").disabled=txnPage<=0;document.getElementById("nextBtn").disabled=txnPage>=pages-1}

function renderCompare(){const months=MONTHLY.map(m=>m.YM);const el=document.getElementById("content");
// Smart defaults: current month vs same month last year
const now=new Date();const curYM=now.toISOString().slice(0,7);const prevYM=(now.getFullYear()-1)+curYM.slice(4);
const defB=months.includes(curYM)?curYM:months[months.length-1];const defA=months.includes(prevYM)?prevYM:months[months.length-2];
el.innerHTML=`<div class="section"><div class="section-title">Month-over-Month Comparison</div><div class="compare-row"><select class="compare-select" id="cmpA" onchange="updateCompare()"><option value="">Select Month A</option>${months.map(m=>`<option value="${m}"${m===defA?' selected':''}>${m}</option>`).join("")}</select><span style="color:var(--text4);font-weight:700">vs</span><select class="compare-select" id="cmpB" onchange="updateCompare()"><option value="">Select Month B</option>${months.map(m=>`<option value="${m}"${m===defB?' selected':''}>${m}</option>`).join("")}</select></div><div id="compareResult"></div></div>`;updateCompare()}

// ============================================================
// RECURRING TRANSACTION DETECTION
// ============================================================
function detectRecurring(){
  const txns=getFilteredTxns();
  // Group by source
  const bySource={};
  txns.forEach(t=>{
    if(!t.s)return;
    if(!bySource[t.s])bySource[t.s]=[];
    bySource[t.s].push(t);
  });
  const recurring=[];
  Object.entries(bySource).forEach(([src,items])=>{
    // Need at least 3 occurrences
    if(items.length<3)return;
    // Get unique months
    const months=[...new Set(items.map(t=>t.d.slice(0,7)))].sort();
    if(months.length<3)return;
    // Check regularity: are amounts consistent?
    const amounts=items.map(t=>t.v).sort((a,b)=>a-b);
    const median=amounts[Math.floor(amounts.length/2)];
    // At least 60% of transactions within 30% of median
    const consistent=amounts.filter(a=>Math.abs(a-median)/Math.max(median,1)<0.3).length;
    if(consistent/amounts.length<0.6)return;
    // Check cadence: monthly-ish (gaps mostly 28-35 days)
    const dates=items.map(t=>new Date(t.d)).sort((a,b)=>a-b);
    const gaps=[];
    for(let i=1;i<dates.length;i++)gaps.push((dates[i]-dates[i-1])/(1000*60*60*24));
    const monthlyGaps=gaps.filter(g=>g>=20&&g<=45);
    const isMonthly=monthlyGaps.length/gaps.length>=0.5;
    // Determine frequency
    let freq="monthly",perYear=12;
    if(!isMonthly){
      const avgGap=gaps.reduce((s,g)=>s+g,0)/gaps.length;
      if(avgGap>80&&avgGap<120){freq="quarterly";perYear=4}
      else if(avgGap>340&&avgGap<400){freq="yearly";perYear=1}
      else if(avgGap>12&&avgGap<20){freq="bi-weekly";perYear=26}
      else if(avgGap>=5&&avgGap<=10){freq="weekly";perYear=52}
      else return; // irregular
    }
    const avgAmt=items.reduce((s,t)=>s+t.v,0)/items.length;
    const type=items[0].t;
    const cat=items[0].c||'Uncategorized';
    const lastDate=items.sort((a,b)=>b.d.localeCompare(a.d))[0].d;
    recurring.push({source:src,amount:Math.round(avgAmt*100)/100,type,freq,perYear,annual:Math.round(avgAmt*perYear),category:cat,count:items.length,months:months.length,lastDate});
  });
  recurring.sort((a,b)=>b.annual-a.annual);
  return recurring;
}

function drawSparkline(canvasId,data,color){
  const canvas=document.getElementById(canvasId);
  if(!canvas)return;
  const ctx=canvas.getContext("2d");
  const w=canvas.width,h=canvas.height;
  ctx.clearRect(0,0,w,h);
  if(data.length<2)return;
  const max=Math.max(...data),min=Math.min(...data);
  const range=max-min||1;
  const step=w/(data.length-1);
  // Fill
  ctx.beginPath();
  ctx.moveTo(0,h-(data[0]-min)/range*(h-4)-2);
  data.forEach((v,i)=>{ctx.lineTo(i*step,h-(v-min)/range*(h-4)-2)});
  ctx.lineTo(w,h);ctx.lineTo(0,h);ctx.closePath();
  ctx.fillStyle=color+"18";ctx.fill();
  // Line
  ctx.beginPath();
  data.forEach((v,i)=>{const x=i*step,y=h-(v-min)/range*(h-4)-2;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)});
  ctx.strokeStyle=color;ctx.lineWidth=1.5;ctx.stroke();
  // End dot
  const lastX=(data.length-1)*step,lastY=h-(data[data.length-1]-min)/range*(h-4)-2;
  ctx.beginPath();ctx.arc(lastX,lastY,2,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();
}

function getCategoryMonthlyData(category,monthCount){
  const txns=getFilteredTxns().filter(t=>t.t==="Out"&&t.c===category);
  const allMonths=gfm().map(m=>m.YM).slice(-monthCount);
  const byMonth={};txns.forEach(t=>{const ym=t.d.slice(0,7);byMonth[ym]=(byMonth[ym]||0)+t.v});
  return allMonths.map(ym=>Math.round(byMonth[ym]||0));
}

// TREEMAP (Expense Ratio Breakdown)
// ============================================================
function renderTreemap(containerId,items,labelKey,valueKey){
  const total=items.reduce((s,it)=>s+it[valueKey],0);
  if(!total){document.getElementById(containerId).innerHTML='<p style="color:var(--text4)">No data.</p>';return}
  // Squarified treemap layout (simplified: rows)
  const sorted=[...items].sort((a,b)=>b[valueKey]-a[valueKey]).slice(0,20);
  let html='<div class="treemap">';
  sorted.forEach((it,i)=>{
    const pct=it[valueKey]/total*100;
    const minW=Math.max(pct*2,8);
    const bg=P[i%P.length];
    html+=`<div class="treemap-item" style="flex:${Math.max(pct,2)};background:${bg};min-width:${minW}%" title="${it[labelKey]}: ${fmtE(it[valueKey])} (${pct.toFixed(1)}%)">
      ${pct>3?`<div class="treemap-item-label">${it[labelKey]}</div>`:''}
      ${pct>5?`<div class="treemap-item-value">${fmtE(it[valueKey])}</div>`:''}
      <div class="treemap-item-pct">${pct.toFixed(1)}%</div>
    </div>`;
  });
  html+='</div>';
  document.getElementById(containerId).innerHTML=html;
}


// ============================================================
// CALENDAR HEATMAP
// ============================================================
function renderHeatmap(containerId){
  const txns=getFilteredTxns().filter(t=>t.t==='Out');
  const byDay={};
  for(const t of txns)byDay[t.d]=(byDay[t.d]||0)+t.v;
  let endDate=new Date();
  let startDate;
  if(yearFilter!=='All'){
    startDate=new Date(`${yearFilter}-01-01`);
    endDate=new Date(`${yearFilter}-12-31`);
  } else {
    startDate=new Date();startDate.setFullYear(startDate.getFullYear()-1);
  }
  const sd=new Date(startDate);
  const dow=(sd.getDay()+6)%7;
  sd.setDate(sd.getDate()-dow);
  const cells=[];
  const d=new Date(sd);
  while(d<=endDate){
    const iso=d.toISOString().slice(0,10);
    cells.push({date:iso,value:byDay[iso]||0,inRange:d>=startDate&&d<=endDate});
    d.setDate(d.getDate()+1);
  }
  const max=Math.max(...cells.map(c=>c.value),1);
  const color=v=>{
    if(!v)return 'var(--bg4)';
    const t=Math.min(1,Math.log10(1+v)/Math.log10(1+max));
    if(t<0.2)return 'rgba(239,68,68,0.15)';
    if(t<0.4)return 'rgba(239,68,68,0.30)';
    if(t<0.6)return 'rgba(239,68,68,0.50)';
    if(t<0.8)return 'rgba(239,68,68,0.75)';
    return '#ef4444';
  };
  const html=cells.map(c=>{
    const opacity=c.inRange?1:0.2;
    return `<div class="heatmap-cell" style="background:${color(c.value)};opacity:${opacity}" title="${c.date}: ${fmtE(c.value)}" onclick="jumpToDay('${c.date}')"></div>`;
  }).join('');
  const el=document.getElementById(containerId);
  if(!el)return;
  el.innerHTML=`
    <div class="heatmap-wrap"><div class="heatmap">${html}</div></div>
    <div class="heatmap-legend">
      <span>Less</span>
      ${[0.15,0.30,0.50,0.75,1].map(a=>`<span class="heatmap-legend-cell" style="background:rgba(239,68,68,${a})"></span>`).join('')}
      <span>More</span>
    </div>`;
}

async function exportMonthPDF(){
  const months=[...new Set(TXNS.map(t=>t.d.slice(0,7)))].sort().reverse();
  if(!months.length){alert('No data');return}
  const ym=prompt('Month to export (YYYY-MM):',months[0]);
  if(!ym||!/^\d{4}-\d{2}$/.test(ym))return;
  const all=TXNS.filter(t=>t.d.startsWith(ym));
  if(!all.length){alert('No transactions for '+ym);return}
  const out=all.filter(t=>t.t==='Out');
  const inT=all.filter(t=>t.t==='In');
  const totalOut=out.reduce((s,t)=>s+t.v,0);
  const totalIn=inT.reduce((s,t)=>s+t.v,0);

  const catMap={};out.forEach(t=>{catMap[t.c]=(catMap[t.c]||0)+t.v});
  const topCats=Object.entries(catMap).sort((a,b)=>b[1]-a[1]).slice(0,8);

  const srcMap={};out.forEach(t=>{srcMap[t.s]=(srcMap[t.s]||0)+t.v});
  const topMerchants=Object.entries(srcMap).sort((a,b)=>b[1]-a[1]).slice(0,8);

  const rec=detectRecurring().filter(r=>r.lastDate&&r.lastDate.startsWith(ym));

  const histBySrc={};
  TXNS.forEach(t=>{if(t.t!=='Out')return;if(!histBySrc[t.s])histBySrc[t.s]=[];histBySrc[t.s].push(t.v)});
  const anomalies=out.filter(t=>{
    const h=histBySrc[t.s];
    if(!h||h.length<4)return false;
    const mean=h.reduce((a,b)=>a+b,0)/h.length;
    const sd=Math.sqrt(h.reduce((s,v)=>s+(v-mean)**2,0)/h.length);
    return sd>0&&t.v>mean+2*sd&&t.v>25;
  }).sort((a,b)=>b.v-a.v).slice(0,8);

  const chartCanvas=document.createElement('canvas');
  chartCanvas.width=600;chartCanvas.height=280;
  document.body.appendChild(chartCanvas);
  chartCanvas.style.position='fixed';chartCanvas.style.top='-9999px';
  const tmpChart=new Chart(chartCanvas,{
    type:'bar',
    data:{labels:['Income','Expenses','Net'],datasets:[{data:[totalIn,totalOut,totalIn-totalOut],backgroundColor:['#10b981','#ef4444','#06b6d4']}]},
    options:{animation:false,responsive:false,plugins:{legend:{display:false}}}
  });
  await new Promise(r=>setTimeout(r,200));
  const chartImg=chartCanvas.toDataURL('image/png');
  tmpChart.destroy();chartCanvas.remove();

  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({unit:'pt',format:'a4'});
  const W=doc.internal.pageSize.getWidth();
  let y=40;
  doc.setFont('helvetica','bold');doc.setFontSize(20);
  doc.text(`Financial Report — ${ym}`,40,y);y+=22;
  doc.setFont('helvetica','normal');doc.setFontSize(10);doc.setTextColor(120);
  doc.text(`${all.length} transactions · Generated ${new Date().toLocaleDateString('en-GB')}`,40,y);y+=22;
  doc.setTextColor(0);doc.setFontSize(11);
  const kpis=[
    ['Income','€'+Math.round(totalIn).toLocaleString()],
    ['Expenses','€'+Math.round(totalOut).toLocaleString()],
    ['Net','€'+Math.round(totalIn-totalOut).toLocaleString()],
    ['Savings rate',totalIn>0?((totalIn-totalOut)/totalIn*100).toFixed(1)+'%':'—']
  ];
  const colW=(W-80)/4;
  kpis.forEach(([l,v],i)=>{
    const x=40+i*colW;
    doc.setFontSize(9);doc.setTextColor(120);doc.text(l.toUpperCase(),x,y);
    doc.setFontSize(14);doc.setTextColor(0);doc.text(v,x,y+16);
  });
  y+=36;
  doc.addImage(chartImg,'PNG',40,y,W-80,160);y+=176;
  doc.autoTable({startY:y,head:[['Top categories','Amount']],body:topCats.map(([c,v])=>[c,'€'+Math.round(v).toLocaleString()]),theme:'grid',headStyles:{fillColor:[16,185,129]},margin:{left:40,right:40}});
  y=doc.lastAutoTable.finalY+14;
  doc.autoTable({startY:y,head:[['Top merchants','Amount']],body:topMerchants.map(([s,v])=>[s,'€'+Math.round(v).toLocaleString()]),theme:'grid',headStyles:{fillColor:[59,130,246]},margin:{left:40,right:40}});
  y=doc.lastAutoTable.finalY+14;
  if(anomalies.length){
    doc.autoTable({startY:y,head:[['Anomalies','Date','Amount']],body:anomalies.map(t=>[t.s,t.d,'€'+Math.round(t.v).toLocaleString()]),theme:'grid',headStyles:{fillColor:[245,158,11]},margin:{left:40,right:40}});
    y=doc.lastAutoTable.finalY+14;
  }
  if(rec.length){
    doc.autoTable({startY:y,head:[['Recurring this month','Amount','Type']],body:rec.slice(0,10).map(r=>[r.source,'€'+r.amount.toFixed(2),r.type==='In'?'Income':'Expense']),theme:'grid',headStyles:{fillColor:[139,92,246]},margin:{left:40,right:40}});
  }

}

const CHAT_TOOLS=[
  {

      properties:{
        group_by:{type:'string',enum:['category','source','bank','month','year','type'],description:'Field to group by. "month"=YYYY-MM, "year"=YYYY.'},

      }

  },

    name:'list_distinct_values',
    description:'List all distinct values for a column (e.g. all categories, banks, sources). Useful to discover what is queryable before filtering.',
    input_schema:{
      type:'object',
      required:['field'],
      properties:{
        field:{type:'string',enum:['category','source','bank','type']},
        type_filter:{type:'string',enum:['In','Out'],description:'Only include rows of this type'}
      }
    }
  }
];

function _filterRows(af){
  let rows=TXNS;
  if(af.date_from)rows=rows.filter(t=>t.d>=af.date_from);
  if(af.date_to)rows=rows.filter(t=>t.d<=af.date_to);
  if(af.type)rows=rows.filter(t=>t.t===af.type);
  if(af.category)rows=rows.filter(t=>t.c===af.category);
  if(af.category_contains){const q=af.category_contains.toLowerCase();rows=rows.filter(t=>(t.c||'').toLowerCase().includes(q));}
  if(af.source_contains){const q=af.source_contains.toLowerCase();rows=rows.filter(t=>(t.s||'').toLowerCase().includes(q));}
  if(af.bank)rows=rows.filter(t=>t.b===af.bank);
  if(af.amount_min!=null)rows=rows.filter(t=>t.v>=af.amount_min);
  if(af.amount_max!=null)rows=rows.filter(t=>t.v<=af.amount_max);
  if(af.search){const q=af.search.toLowerCase();rows=rows.filter(t=>((t.s||'')+' '+(t.r||'')+' '+(t.c||'')).toLowerCase().includes(q));}
  return rows;
}
function tool_query_transactions(args){
  const af=args||{};
  let rows=_filterRows(af);
  const sortBy=af.sort_by||'date_desc';
  if(sortBy==='date_desc')rows=[...rows].sort((a,b)=>b.d.localeCompare(a.d));
  else if(sortBy==='date_asc')rows=[...rows].sort((a,b)=>a.d.localeCompare(b.d));
  else if(sortBy==='amount_desc')rows=[...rows].sort((a,b)=>b.v-a.v);
  else if(sortBy==='amount_asc')rows=[...rows].sort((a,b)=>a.v-b.v);
  const limit=Math.min(Math.max(af.limit||50,1),200);
  const total=rows.length;
  const totalAmount=rows.reduce((s,t)=>s+t.v,0);
  const items=rows.slice(0,limit).map(t=>({date:t.d,amount:t.v,type:t.t,source:t.s,bank:t.b,category:t.c,detail:t.r}));
  return {total_matching:total,returned:items.length,total_amount:Math.round(totalAmount*100)/100,items};
}
function tool_aggregate(args){
  const af=args||{};
  const rows=_filterRows(af);
  const keyFn={
    category:t=>t.c||'(uncategorized)',
    source:t=>t.s||'(no source)',
    bank:t=>t.b||'(no bank)',
    month:t=>(t.d||'').slice(0,7),
    year:t=>(t.d||'').slice(0,4),
    type:t=>t.t
  }[af.group_by];
  if(!keyFn)return {error:'invalid group_by'};
  const map={};
  for(const t of rows){
    const k=keyFn(t);
    if(!map[k])map[k]={group:k,count:0,sum:0};
    map[k].count++;
    map[k].sum+=t.v;
  }
  const groups=Object.values(map).map(g=>({
    group:g.group,count:g.count,
    sum:Math.round(g.sum*100)/100,
    avg:Math.round(g.sum/g.count*100)/100
  })).sort((a,b)=>b.sum-a.sum);
  const limit=Math.min(Math.max(af.limit||20,1),100);
  return {total_rows:rows.length,group_count:groups.length,groups:groups.slice(0,limit)};
}
function tool_list_distinct(args){
  const af=args||{};
  const fnMap={category:t=>t.c,source:t=>t.s,bank:t=>t.b,type:t=>t.t};
  const fn=fnMap[af.field];
  if(!fn)return {error:'invalid field'};
  let rows=TXNS;
  if(af.type_filter)rows=rows.filter(t=>t.t===af.type_filter);
  const set=new Set();
  for(const t of rows){const v=fn(t);if(v)set.add(v);}
  return {field:af.field,count:set.size,values:[...set].sort()};
}
function execChatTool(name,input){
  try{
    if(name==='query_transactions')return tool_query_transactions(input);
    if(name==='aggregate')return tool_aggregate(input);
    if(name==='list_distinct_values')return tool_list_distinct(input);
    return {error:'Unknown tool: '+name};
  }catch(e){return {error:e.message||String(e)};}
}
function buildChatSystem(){
  const dates=TXNS.map(t=>t.d).filter(Boolean);
  const minD=dates[dates.length-1]||'';
  const maxD=dates[0]||'';
  return `You are a helpful financial analyst assistant embedded in the user's personal revenue & expenses dashboard. The currency is EUR (€). Be concise and factual.

DATASET:
- Total transactions: ${TXNS.length}
- Date range: ${minD} to ${maxD}
- Each transaction has: date (YYYY-MM-DD), amount (positive number), type ("In"=income or "Out"=expense), source/merchant, bank, category, detail

You have tools to query the full transaction database on demand. Use them whenever the answer requires specifics — don't guess or make up numbers. Use multiple tool calls when needed (e.g. first list_distinct_values to discover categories, then aggregate to break them down). After tool calls, give the user a clear, concise answer with the actual numbers.

Current dashboard view: tab="${activeTab}", yearFilter="${yearFilter}".`;
}
async function sendChat(){
  if(CHAT.busy)return;
  const input=document.getElementById('chatInput');
  const text=input.value.trim();
  if(!text)return;
  if(!CHAT.apiKey){toggleChatSettings(true);return;}
  input.value='';
  appendMsg('user',text);
  CHAT.history.push({role:'user',content:text});
  CHAT.busy=true;
  document.getElementById('chatSend').disabled=true;
  let typingNode=appendMsg('bot','',{typing:true});
  try{
    const system=buildChatSystem();
    let safety=0;
    while(safety++<10){
      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{
          'content-type':'application/json',
          'x-api-key':CHAT.apiKey,
          'anthropic-version':'2023-06-01',
          'anthropic-dangerous-direct-browser-access':'true'
        },
        body:JSON.stringify({
          model:CHAT.model,
          max_tokens:2048,
          system,
          tools:CHAT_TOOLS,
          messages:CHAT.history
        })
      });
      if(!res.ok){
        const errBody=await res.text();
        let msg='API error '+res.status;
        try{const j=JSON.parse(errBody);if(j.error&&j.error.message)msg=j.error.message;}catch{}
        if(typingNode){typingNode.remove();typingNode=null;}
        appendMsg('bot',msg,{error:true});
        // Roll back to last user message so retry works
        while(CHAT.history.length&&CHAT.history[CHAT.history.length-1].role!=='user')CHAT.history.pop();
        if(CHAT.history.length&&CHAT.history[CHAT.history.length-1].role==='user')CHAT.history.pop();
        break;
      }
      const data=await res.json();
      const content=data.content||[];
      CHAT.history.push({role:'assistant',content});
      // Display any text blocks
      const textBlocks=content.filter(b=>b.type==='text');
      const toolUses=content.filter(b=>b.type==='tool_use');
      if(textBlocks.length||toolUses.length){
        if(typingNode){typingNode.remove();typingNode=null;}
      }
      for(const tb of textBlocks){
        if(tb.text&&tb.text.trim())appendMsg('bot',tb.text);
      }
      if(data.stop_reason!=='tool_use'||toolUses.length===0)break;
      // Show small "looking up data..." note
      typingNode=appendMsg('bot','',{typing:true});
      // Execute each tool call
      const toolResults=toolUses.map(tu=>({
        type:'tool_result',
        tool_use_id:tu.id,
        content:JSON.stringify(execChatTool(tu.name,tu.input||{}))
      }));
      CHAT.history.push({role:'user',content:toolResults});
    }
    if(typingNode){typingNode.remove();typingNode=null;}
  }catch(err){
    if(typingNode){typingNode.remove();typingNode=null;}
    appendMsg('bot','Network error: '+err.message,{error:true});
    while(CHAT.history.length&&CHAT.history[CHAT.history.length-1].role!=='user')CHAT.history.pop();
    if(CHAT.history.length&&CHAT.history[CHAT.history.length-1].role==='user')CHAT.history.pop();
  }finally{
    CHAT.busy=false;
    document.getElementById('chatSend').disabled=false;
    input.focus();
  }
}
</script>
</body>
</html>
