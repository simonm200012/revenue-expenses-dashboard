name: Weekly AI finance summary

on:
  schedule:
    # Mondays at 07:00 UTC (09:00 Ljubljana in CEST, 08:00 in CET).
    - cron: '0 7 * * 1'
  workflow_dispatch: {}

jobs:
  summary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate and send summary
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: node scripts/weekly-summary.mjs
